kind = "web"
previewPath = "/"
title = "Legal Nations"
version = "1.0.0"
id = "artifacts/legal-nations"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19540

[services.development]
run = "pnpm --filter @workspace/legal-nations run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/legal-nations", "run", "build" ]
publicDir = "artifacts/legal-nations/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19540"
BASE_PATH = "/"
